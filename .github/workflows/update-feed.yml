name: Update Yandex Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feed pipeline
        run: |
          python scripts/run_pipeline.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp output/yandex-books.yml public/yandex-books.yml
          cp output/yandex-books.csv public/yandex-books.csv || true
          cp output/yandex-books-catalog.csv public/yandex-books-catalog.csv || true
          cp output/yandex-books-special.csv public/yandex-books-special.csv || true
          cp output/yandex-books-google.xml public/yandex-books-google.xml || true
          cp output/parsing_report.csv public/parsing_report.csv || true
          cp output/books_parsed.csv public/books_parsed.csv || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build-feed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
