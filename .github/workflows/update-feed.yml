name: Update Yandex Feed

on:
  workflow_dispatch:
  schedule:
    # Daily at 05:00 UTC. Adjust if needed.
    - cron: "0 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed pipeline
        run: python scripts/run_pipeline.py

      - name: Commit updated output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/yandex-books.yml output/books_urls.csv output/books_parsed.csv output/parsing_report.csv
          git commit -m "Update Yandex feed" || echo "No changes to commit"
          git push

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy-pages:
    needs: build-feed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
